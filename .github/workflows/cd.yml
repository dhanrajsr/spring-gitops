name: GitOps CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Validate Helm Charts
  # ─────────────────────────────────────────
  helm-validate:
    name: Validate Helm Charts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint spring-maven Helm chart
        run: |
          helm lint apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-staging.yaml

          helm lint apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-production.yaml

      - name: Lint spring-gradle Helm chart
        run: |
          helm lint apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-staging.yaml

          helm lint apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-production.yaml

      - name: Render and validate templates (spring-maven staging)
        run: |
          helm template spring-maven-staging apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-staging.yaml \
            --namespace staging

      - name: Render and validate templates (spring-maven production)
        run: |
          helm template spring-maven-production apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-production.yaml \
            --namespace production

      - name: Render and validate templates (spring-gradle staging)
        run: |
          helm template spring-gradle-staging apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-staging.yaml \
            --namespace staging

      - name: Render and validate templates (spring-gradle production)
        run: |
          helm template spring-gradle-production apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-production.yaml \
            --namespace production

  # ─────────────────────────────────────────
  # Stage 2: ArgoCD Wait — Staging
  # Runs on self-hosted runner (has access to local Kind cluster)
  # ArgoCD auto-sync handles the actual deploy — this just waits
  # for it to complete and confirms health
  # ─────────────────────────────────────────
  sync-staging:
    name: ArgoCD Wait — Staging Healthy
    runs-on: [self-hosted, docker, linux]
    needs: helm-validate

    steps:
      - name: Wait for spring-maven staging to be Synced
        run: |
          kubectl wait app/spring-maven-staging -n argocd \
            --for=jsonpath='{.status.sync.status}'=Synced \
            --timeout=180s

      - name: Wait for spring-maven staging to be Healthy
        run: |
          kubectl wait app/spring-maven-staging -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=180s

      - name: Wait for spring-gradle staging to be Synced
        run: |
          kubectl wait app/spring-gradle-staging -n argocd \
            --for=jsonpath='{.status.sync.status}'=Synced \
            --timeout=180s

      - name: Wait for spring-gradle staging to be Healthy
        run: |
          kubectl wait app/spring-gradle-staging -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=180s

  # ─────────────────────────────────────────
  # Stage 3: Approve → ArgoCD Sync Production
  # Requires manual approval in GitHub Environments
  # Runs on self-hosted runner (has access to local Kind cluster)
  # ─────────────────────────────────────────
  sync-production:
    name: Approve → ArgoCD Sync Production
    runs-on: [self-hosted, docker, linux]
    needs: sync-staging
    environment:
      name: production
      url: http://localhost:30090

    steps:
      - name: Trigger sync for spring-maven production
        run: |
          kubectl patch app spring-maven-production -n argocd --type=merge \
            -p '{"operation": {"initiatedBy": {"username": "cd-pipeline"}, "sync": {}}}'

      - name: Wait for spring-maven production to be Synced
        run: |
          kubectl wait app/spring-maven-production -n argocd \
            --for=jsonpath='{.status.sync.status}'=Synced \
            --timeout=120s

      - name: Wait for spring-maven production to be Healthy
        run: |
          kubectl wait app/spring-maven-production -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=120s

      - name: Trigger sync for spring-gradle production
        run: |
          kubectl patch app spring-gradle-production -n argocd --type=merge \
            -p '{"operation": {"initiatedBy": {"username": "cd-pipeline"}, "sync": {}}}'

      - name: Wait for spring-gradle production to be Synced
        run: |
          kubectl wait app/spring-gradle-production -n argocd \
            --for=jsonpath='{.status.sync.status}'=Synced \
            --timeout=120s

      - name: Wait for spring-gradle production to be Healthy
        run: |
          kubectl wait app/spring-gradle-production -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=120s
