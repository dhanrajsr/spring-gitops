name: GitOps CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Validate Helm Charts
  # ─────────────────────────────────────────
  helm-validate:
    name: Validate Helm Charts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint spring-maven Helm chart
        run: |
          helm lint apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-staging.yaml

          helm lint apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-production.yaml

      - name: Lint spring-gradle Helm chart
        run: |
          helm lint apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-staging.yaml

          helm lint apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-production.yaml

      - name: Render and validate templates (spring-maven staging)
        run: |
          helm template spring-maven-staging apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-staging.yaml \
            --namespace staging

      - name: Render and validate templates (spring-maven production)
        run: |
          helm template spring-maven-production apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-production.yaml \
            --namespace production

      - name: Render and validate templates (spring-gradle staging)
        run: |
          helm template spring-gradle-staging apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-staging.yaml \
            --namespace staging

      - name: Render and validate templates (spring-gradle production)
        run: |
          helm template spring-gradle-production apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-production.yaml \
            --namespace production

  # ─────────────────────────────────────────
  # Stage 2: Trigger ArgoCD Sync — Staging
  # Runs automatically after Helm validation passes
  # ArgoCD auto-sync will also pick this up,
  # but this step forces an immediate sync
  # ─────────────────────────────────────────
  sync-staging:
    name: ArgoCD Sync — Staging
    runs-on: ubuntu-latest
    needs: helm-validate

    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login localhost:31607 \
            --username admin \
            --password ${{ secrets.ARGOCD_ADMIN_PASSWORD }} \
            --insecure

      - name: Sync spring-maven staging
        run: argocd app sync spring-maven-staging --timeout 120

      - name: Wait for spring-maven staging to be healthy
        run: argocd app wait spring-maven-staging --health --timeout 120

      - name: Sync spring-gradle staging
        run: argocd app sync spring-gradle-staging --timeout 120

      - name: Wait for spring-gradle staging to be healthy
        run: argocd app wait spring-gradle-staging --health --timeout 120

  # ─────────────────────────────────────────
  # Stage 3: Approve → ArgoCD Sync Production
  # Requires manual approval in GitHub Environments
  # After approval, pipeline triggers ArgoCD sync
  # ─────────────────────────────────────────
  sync-production:
    name: Approve → ArgoCD Sync Production
    runs-on: ubuntu-latest
    needs: sync-staging
    environment:
      name: production
      url: http://localhost:30090

    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login localhost:31607 \
            --username admin \
            --password ${{ secrets.ARGOCD_ADMIN_PASSWORD }} \
            --insecure

      - name: Sync spring-maven production
        run: argocd app sync spring-maven-production --timeout 120

      - name: Wait for spring-maven production to be healthy
        run: argocd app wait spring-maven-production --health --timeout 120

      - name: Sync spring-gradle production
        run: argocd app sync spring-gradle-production --timeout 120

      - name: Wait for spring-gradle production to be healthy
        run: argocd app wait spring-gradle-production --health --timeout 120
