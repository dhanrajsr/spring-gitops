name: GitOps CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      cluster:
        description: "Target cluster"
        required: true
        type: choice
        options: [kind, eks]
        default: kind

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Validate Helm Charts
  # ─────────────────────────────────────────
  helm-validate:
    name: Validate Helm Charts
    runs-on: [self-hosted, docker, linux]

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4

      - name: Set up Helm
        run: helm version

      - name: Lint spring-maven Helm chart
        run: |
          helm lint apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-staging.yaml

          helm lint apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-production.yaml

      - name: Lint spring-gradle Helm chart
        run: |
          helm lint apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-staging.yaml

          helm lint apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-production.yaml

      - name: Render and validate templates (spring-maven staging)
        run: |
          helm template spring-maven-staging apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-staging.yaml \
            --namespace staging

      - name: Render and validate templates (spring-maven production)
        run: |
          helm template spring-maven-production apps/spring-maven/helm \
            -f apps/spring-maven/helm/values.yaml \
            -f apps/spring-maven/helm/values-production.yaml \
            --namespace production

      - name: Render and validate templates (spring-gradle staging)
        run: |
          helm template spring-gradle-staging apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-staging.yaml \
            --namespace staging

      - name: Render and validate templates (spring-gradle production)
        run: |
          helm template spring-gradle-production apps/spring-gradle/helm \
            -f apps/spring-gradle/helm/values.yaml \
            -f apps/spring-gradle/helm/values-production.yaml \
            --namespace production

  # ─────────────────────────────────────────
  # Stage 2: Deploy to Kind (local cluster)
  # ─────────────────────────────────────────
  sync-staging-kind:
    name: ArgoCD Wait — Kind Staging Healthy
    runs-on: [self-hosted, docker, linux]
    needs: helm-validate
    if: github.event_name == 'push' || inputs.cluster == 'kind'

    steps:
      - name: Set kubeconfig to Kind cluster
        run: kubectl config use-context kind-calico-prod

      - name: Wait for spring-maven staging ArgoCD sync
        run: |
          kubectl wait app/spring-maven-staging -n argocd \
            --for=jsonpath='{.status.operationState.phase}'=Succeeded \
            --timeout=180s || true

      - name: Promote spring-maven staging Blue-Green rollout
        run: |
          kubectl argo rollouts promote spring-maven-staging -n staging || true

      - name: Wait for spring-maven staging to be Healthy
        run: |
          kubectl wait app/spring-maven-staging -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s

      - name: Wait for spring-gradle staging ArgoCD sync
        run: |
          kubectl wait app/spring-gradle-staging -n argocd \
            --for=jsonpath='{.status.operationState.phase}'=Succeeded \
            --timeout=180s || true

      - name: Promote spring-gradle staging Canary rollout
        run: |
          kubectl argo rollouts promote spring-gradle-staging -n staging || true
          sleep 30
          kubectl argo rollouts promote spring-gradle-staging -n staging || true

      - name: Wait for spring-gradle staging to be Healthy
        run: |
          kubectl wait app/spring-gradle-staging -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s

  sync-production-kind:
    name: Approve → ArgoCD Sync Kind Production
    runs-on: [self-hosted, docker, linux]
    needs: sync-staging-kind
    if: github.event_name == 'push' || inputs.cluster == 'kind'
    environment:
      name: production
      url: http://localhost:30090

    steps:
      - name: Set kubeconfig to Kind cluster
        run: kubectl config use-context kind-calico-prod

      - name: Trigger sync for spring-maven production
        run: |
          kubectl patch app spring-maven-production -n argocd --type=merge \
            -p '{"operation": {"initiatedBy": {"username": "cd-pipeline"}, "sync": {}}}'

      - name: Promote spring-maven production Blue-Green rollout
        run: |
          sleep 30
          kubectl argo rollouts promote spring-maven-production -n production || true

      - name: Wait for spring-maven production to be Healthy
        run: |
          kubectl wait app/spring-maven-production -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s

      - name: Trigger sync for spring-gradle production
        run: |
          kubectl patch app spring-gradle-production -n argocd --type=merge \
            -p '{"operation": {"initiatedBy": {"username": "cd-pipeline"}, "sync": {}}}'

      - name: Promote spring-gradle production Canary rollout
        run: |
          sleep 30
          kubectl argo rollouts promote spring-gradle-production -n production || true
          sleep 30
          kubectl argo rollouts promote spring-gradle-production -n production || true

      - name: Wait for spring-gradle production to be Healthy
        run: |
          kubectl wait app/spring-gradle-production -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s

  # ─────────────────────────────────────────
  # Stage 3: Deploy to EKS
  # ─────────────────────────────────────────
  sync-staging-eks:
    name: ArgoCD Wait — EKS Staging Healthy
    runs-on: [self-hosted, docker, linux]
    needs: helm-validate
    if: inputs.cluster == 'eks'

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4

      - name: Set kubeconfig to EKS cluster
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name eks-dev-us-east-1

      - name: Apply ArgoCD ApplicationSets
        run: |
          kubectl apply --server-side -f argocd/applicationset-eks-staging.yaml
          kubectl apply --server-side -f argocd/applicationset-eks-production.yaml

      - name: Wait for spring-maven eks-staging ArgoCD sync
        run: |
          kubectl wait app/spring-maven-eks-staging -n argocd \
            --for=jsonpath='{.status.operationState.phase}'=Succeeded \
            --timeout=180s || true

      - name: Promote spring-maven eks-staging Blue-Green rollout
        run: |
          kubectl argo rollouts promote spring-maven-eks-staging -n staging || true

      - name: Wait for spring-maven eks-staging to be Healthy
        run: |
          kubectl wait app/spring-maven-eks-staging -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s

      - name: Wait for spring-gradle eks-staging ArgoCD sync
        run: |
          kubectl wait app/spring-gradle-eks-staging -n argocd \
            --for=jsonpath='{.status.operationState.phase}'=Succeeded \
            --timeout=180s || true

      - name: Promote spring-gradle eks-staging Canary rollout
        run: |
          kubectl argo rollouts promote spring-gradle-eks-staging -n staging || true
          sleep 30
          kubectl argo rollouts promote spring-gradle-eks-staging -n staging || true

      - name: Wait for spring-gradle eks-staging to be Healthy
        run: |
          kubectl wait app/spring-gradle-eks-staging -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s

  sync-production-eks:
    name: Approve → ArgoCD Sync EKS Production
    runs-on: [self-hosted, docker, linux]
    needs: sync-staging-eks
    if: inputs.cluster == 'eks'
    environment:
      name: production
      url: http://localhost:30090

    steps:
      - name: Set kubeconfig to EKS cluster
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name eks-dev-us-east-1

      - name: Trigger sync for spring-maven eks-production
        run: |
          kubectl patch app spring-maven-eks-production -n argocd --type=merge \
            -p '{"operation": {"initiatedBy": {"username": "cd-pipeline"}, "sync": {}}}'

      - name: Promote spring-maven eks-production Blue-Green rollout
        run: |
          sleep 30
          kubectl argo rollouts promote spring-maven-eks-production -n production || true

      - name: Wait for spring-maven eks-production to be Healthy
        run: |
          kubectl wait app/spring-maven-eks-production -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s

      - name: Trigger sync for spring-gradle eks-production
        run: |
          kubectl patch app spring-gradle-eks-production -n argocd --type=merge \
            -p '{"operation": {"initiatedBy": {"username": "cd-pipeline"}, "sync": {}}}'

      - name: Promote spring-gradle eks-production Canary rollout
        run: |
          sleep 30
          kubectl argo rollouts promote spring-gradle-eks-production -n production || true
          sleep 30
          kubectl argo rollouts promote spring-gradle-eks-production -n production || true

      - name: Wait for spring-gradle eks-production to be Healthy
        run: |
          kubectl wait app/spring-gradle-eks-production -n argocd \
            --for=jsonpath='{.status.health.status}'=Healthy \
            --timeout=300s
