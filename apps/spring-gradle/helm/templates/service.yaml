# Stable service — receives traffic from old (stable) pods
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-stable
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    role: stable
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
---
# Canary service — receives traffic from new (canary) pods
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-canary
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    role: canary
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
