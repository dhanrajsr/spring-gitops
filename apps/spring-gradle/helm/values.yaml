image:
  repository: dhanrajsubbaianind/spring-gradle-app
  tag: 38b8f333333c8c409a8fa3f2b3533ebed7673eed
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 90
  periodSeconds: 10

readinessProbe:
  path: /api/health
  initialDelaySeconds: 75
  periodSeconds: 5

canary:
  # Steps defined in rollout.yaml:
  # 20% → manual pause → 50% → 30s pause → 100%
  # Override replicaCount per environment for meaningful traffic split
  replicaCount: 2
