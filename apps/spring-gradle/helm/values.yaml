image:
  repository: dhanrajsubbaianind/spring-gradle-app
  tag: latest
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  path: /api/health
  initialDelaySeconds: 20
  periodSeconds: 5
