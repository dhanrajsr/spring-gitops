image:
  repository: dhanrajsubbaianind/spring-gradle-app
  tag: 00d00358724a8e523c22288134258ee246fac138
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 90
  periodSeconds: 10

readinessProbe:
  path: /api/health
  initialDelaySeconds: 75
  periodSeconds: 5

ingress:
  host: spring-gradle.devopscab.com
  certificateArn: arn:aws:acm:us-east-1:497041484428:certificate/aeb50a3f-01af-4fbc-9165-45acde587dee

canary:
  # Steps defined in rollout.yaml:
  # 20% → manual pause → 50% → 30s pause → 100%
  replicaCount: 2
