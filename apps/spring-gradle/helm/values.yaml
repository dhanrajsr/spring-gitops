image:
  repository: dhanrajsubbaianind/spring-gradle-app
  tag: f4131d17cb759b3f45ebd0be65ff5fa2d5b084b6
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 90
  periodSeconds: 10

readinessProbe:
  path: /api/health
  initialDelaySeconds: 75
  periodSeconds: 5

canary:
  # Steps defined in rollout.yaml:
  # 20% → manual pause → 50% → 30s pause → 100%
  # Override replicaCount per environment for meaningful traffic split
  replicaCount: 2
