image:
  repository: dhanrajsubbaianind/spring-gradle-app
  tag: c05ea6bee8c62c4af0a10815803e3abcb394f70b
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 90
  periodSeconds: 10

readinessProbe:
  path: /api/health
  initialDelaySeconds: 75
  periodSeconds: 5

ingress:
  host: spring-gradle.staging.local   # override per environment

canary:
  # Steps defined in rollout.yaml:
  # 20% → manual pause → 50% → 30s pause → 100%
  replicaCount: 2
