replicaCount: 2

service:
  type: ClusterIP

ingress:
  host: spring-maven.devopscab.com
  previewHost: spring-maven-preview.devopscab.com

# ── HPA enabled in production ─────────────────────────────────────
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

# ── KEDA enabled in production ────────────────────────────────────
keda:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  pollingInterval: 30
  cooldownPeriod: 120

  # Scale on HTTP request rate
  http:
    enabled: true
    hosts:
      - spring-maven.devopscab.com
    targetRequestsPerSecond: "100"

  # SQS scaler — disabled until a queue is wired up
  sqs:
    enabled: false
    queueURL: ""
    targetQueueLength: "10"
    region: us-east-1

  # Cron scaler — pre-scale during business hours (IST)
  cron:
    enabled: true
    timezone: Asia/Kolkata
    start: "0 8 * * 1-5"           # Mon-Fri 8am IST
    end: "0 20 * * 1-5"            # Mon-Fri 8pm IST
    desiredReplicas: "3"
