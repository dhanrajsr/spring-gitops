image:
  repository: dhanrajsubbaianind/spring-maven-app
  tag: 20cac8e3a72ec8cff055c4df96520c42b42209d1
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /api/health
  initialDelaySeconds: 90
  periodSeconds: 10

readinessProbe:
  path: /api/health
  initialDelaySeconds: 75
  periodSeconds: 5

blueGreen:
  autoPromotionEnabled: false   # manual promotion required
  scaleDownDelaySeconds: 30     # keep old blue pods 30s after promotion
